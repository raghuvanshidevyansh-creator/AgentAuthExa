app            = "agentauth-discovery"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  # Run: fly deploy --config agentauth-platform/backend/fly.toml
  # from AgentAuthExa/ so Docker build context includes both agentauth/ and agentauth-platform/

[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    interval     = "15s"
    timeout      = "5s"
    grace_period = "90s"
    method       = "GET"
    path         = "/health"

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1

[[mounts]]
  source       = "agentauth_data"
  destination  = "/data"
  initial_size = "1gb"
